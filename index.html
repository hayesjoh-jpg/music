<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Music Panel</title>

  <style>
    :root{
      --bg0:#050812;
      --bg1:#0b1230;
      --card: rgba(255,255,255,.08);
      --card2: rgba(255,255,255,.05);
      --stroke: rgba(255,255,255,.14);
      --text:#EAF0FF;
      --muted:#AAB6D2;
      --accent:#1DB954;
      --shadow: 0 18px 55px rgba(0,0,0,.55);
      --r: 22px;
      --glowA: rgba(29,185,84,.28);
      --glowB: rgba(80,145,255,.22);
    }

    body.theme-light{
      --bg0:#eef2ff;
      --bg1:#f7f9ff;
      --card: rgba(255,255,255,.75);
      --card2: rgba(255,255,255,.55);
      --stroke: rgba(0,0,0,.10);
      --text:#0e1422;
      --muted:#4b5870;
      --accent:#1DB954;
      --shadow: 0 16px 45px rgba(0,0,0,.10);
      --glowA: rgba(29,185,84,.20);
      --glowB: rgba(80,145,255,.18);
    }

    body.theme-radio{
      --bg0:#090b13;
      --bg1:#1b1034;
      --card: rgba(255,255,255,.07);
      --card2: rgba(255,255,255,.04);
      --stroke: rgba(255,255,255,.13);
      --text:#fff2f2;
      --muted:#d2b7bf;
      --accent:#ff3b5c;
      --shadow: 0 18px 55px rgba(0,0,0,.55);
      --glowA: rgba(255,59,92,.24);
      --glowB: rgba(255,196,59,.14);
    }

    *{ box-sizing:border-box; }

    html, body{
      height:100%;
      margin:0;
    }

    body{
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      color: var(--text);
      background:
        radial-gradient(1200px 800px at 18% -10%, var(--glowB) 0%, transparent 55%),
        radial-gradient(900px 650px at 92% 8%, var(--glowA) 0%, transparent 52%),
        linear-gradient(180deg, var(--bg1), var(--bg0));
      overflow-x:hidden;
    }

    .app{
      max-width:1100px;
      margin:0 auto;
      padding:16px;
      display:flex;
      flex-direction:column;
      gap:14px;
    }

    header{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      padding:6px 4px 0;
      flex-wrap:wrap;
    }

    .brand{
      display:flex;
      flex-direction:column;
      gap:4px;
    }

    .brand .title{
      font-size:24px;
      font-weight:800;
      letter-spacing:.2px;
    }

    .brand .sub{
      color:var(--muted);
      font-size:13px;
    }

    .right{
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
    }

    .pill{
      border:1px solid var(--stroke);
      background: rgba(0,0,0,.18);
      padding:10px 14px;
      border-radius:999px;
      box-shadow: var(--shadow);
      color: var(--muted);
      font-variant-numeric: tabular-nums;
      min-width:118px;
      text-align:center;
      backdrop-filter: blur(10px);
    }

    .themebar{
      display:flex;
      gap:8px;
      border:1px solid var(--stroke);
      background: rgba(0,0,0,.14);
      border-radius:999px;
      padding:6px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    .chip{
      border:0;
      border-radius:999px;
      padding:10px 12px;
      color: var(--text);
      background: transparent;
      font-weight:750;
      font-size:13px;
      cursor:pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .chip.active{
      background: rgba(255,255,255,.12);
      border:1px solid var(--stroke);
    }

    .grid{
      display:grid;
      grid-template-columns: 1.15fr .85fr;
      gap:14px;
    }

    @media (max-width: 900px){
      .grid{
        grid-template-columns: 1fr;
      }
    }

    .card{
      border-radius: var(--r);
      border: 1px solid var(--stroke);
      background: linear-gradient(180deg, var(--card), var(--card2));
      box-shadow: var(--shadow);
      overflow:hidden;
      backdrop-filter: blur(14px);
    }

    .card .hd{
      padding:14px 14px 0;
      display:flex;
      align-items:baseline;
      justify-content:space-between;
      gap:10px;
    }

    .card .hd h2{
      margin:0;
      font-size:16px;
      letter-spacing:.2px;
    }

    .card .hd span{
      color:var(--muted);
      font-size:12px;
      white-space:nowrap;
    }

    .card .bd{
      padding:14px;
    }

    .btn-primary{
      width:100%;
      border:0;
      border-radius:18px;
      padding:18px 16px;
      font-size:22px;
      font-weight:900;
      color:#06110a;
      background: var(--accent);
      box-shadow: 0 16px 36px rgba(0,0,0,.25);
      cursor:pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .btn-primary:active{
      transform: translateY(1px);
    }

    .radio-shell{
      position:relative;
      border:1px solid rgba(255,255,255,.12);
      border-radius:24px;
      padding:18px;
      background:
        radial-gradient(circle at top left, rgba(255,255,255,.10), transparent 38%),
        linear-gradient(180deg, rgba(255,255,255,.10), rgba(0,0,0,.26));
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.08),
        0 18px 36px rgba(0,0,0,.30);
    }

    .radio-top{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin-bottom:14px;
    }

    .radio-brand{
      display:flex;
      align-items:center;
      gap:10px;
      color:var(--muted);
      font-size:12px;
      text-transform:uppercase;
      letter-spacing:.18em;
    }

    .live-dot{
      width:10px;
      height:10px;
      border-radius:50%;
      background:#ff5b6e;
      box-shadow:0 0 12px rgba(255,91,110,.75);
    }

    .radio-face{
      display:grid;
      grid-template-columns: minmax(0, 1fr) 108px;
      gap:16px;
      align-items:stretch;
    }

    .radio-panel{
      min-width:0;
      border:1px solid rgba(255,255,255,.12);
      border-radius:20px;
      padding:16px;
      background:linear-gradient(180deg, rgba(7,10,18,.78), rgba(18,24,44,.72));
      box-shadow: inset 0 1px 0 rgba(255,255,255,.06);
    }

    .freq-label{
      color:var(--muted);
      font-size:11px;
      letter-spacing:.24em;
      text-transform:uppercase;
      margin-bottom:8px;
    }

    .radio-station{
      font-size:28px;
      line-height:1;
      font-weight:900;
      letter-spacing:.04em;
      margin:0 0 8px;
      text-transform:uppercase;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .radio-status{
      display:flex;
      align-items:center;
      gap:10px;
      margin-bottom:14px;
    }

    .status-pill{
      padding:5px 10px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.12);
      background:rgba(255,255,255,.08);
      color:var(--text);
      font-size:11px;
      font-weight:800;
      letter-spacing:.12em;
      text-transform:uppercase;
    }

    .status-text{
      color:var(--muted);
      font-size:13px;
    }

    .tuner{
      position:relative;
      height:42px;
      border-radius:14px;
      padding:0 14px;
      background:linear-gradient(180deg, rgba(255,255,255,.04), rgba(0,0,0,.20));
      border:1px solid rgba(255,255,255,.10);
      display:flex;
      align-items:center;
      overflow:hidden;
    }

    .tuner::before{
      content:"";
      position:absolute;
      inset:50% 14px auto;
      height:2px;
      transform:translateY(-50%);
      background:linear-gradient(90deg, rgba(255,255,255,.12), rgba(255,255,255,.65), rgba(255,255,255,.12));
    }

    .tuner-scale{
      position:relative;
      z-index:1;
      display:flex;
      justify-content:space-between;
      width:100%;
      color:var(--muted);
      font-size:11px;
      font-variant-numeric:tabular-nums;
    }

    .tuner-needle{
      position:absolute;
      top:5px;
      bottom:5px;
      left:var(--needle-pos, 50%);
      width:3px;
      border-radius:999px;
      transform:translateX(-50%);
      background:linear-gradient(180deg, #ffe27d, #ff8a2b);
      box-shadow:0 0 10px rgba(255,184,76,.6);
    }

    .radio-bottom{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
      margin-top:14px;
    }

    .signal{
      display:flex;
      align-items:flex-end;
      gap:6px;
      min-height:28px;
    }

    .signal span{
      width:8px;
      border-radius:999px;
      background:linear-gradient(180deg, rgba(126,255,177,.95), rgba(23,164,88,.55));
      box-shadow:0 0 10px rgba(29,185,84,.28);
      opacity:.35;
      transform-origin:bottom;
      transition:opacity .2s ease, transform .2s ease;
    }

    .signal span:nth-child(1){ height:8px; }
    .signal span:nth-child(2){ height:14px; }
    .signal span:nth-child(3){ height:20px; }
    .signal span:nth-child(4){ height:26px; }

    .signal.active span{
      opacity:1;
      animation:equalize 1.1s ease-in-out infinite;
    }

    .signal.active span:nth-child(2){ animation-delay:.15s; }
    .signal.active span:nth-child(3){ animation-delay:.3s; }
    .signal.active span:nth-child(4){ animation-delay:.45s; }

    .radio-caption{
      color:var(--muted);
      font-size:12px;
      letter-spacing:.14em;
      text-transform:uppercase;
    }

    .power-wrap{
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:10px;
    }

    .power-knob{
      width:92px;
      height:92px;
      border-radius:50%;
      border:1px solid rgba(255,255,255,.18);
      background:
        radial-gradient(circle at 30% 30%, rgba(255,255,255,.20), transparent 35%),
        linear-gradient(180deg, rgba(255,255,255,.14), rgba(0,0,0,.25));
      box-shadow:
        inset 0 2px 10px rgba(255,255,255,.06),
        inset 0 -10px 18px rgba(0,0,0,.24),
        0 16px 30px rgba(0,0,0,.24);
      color:var(--text);
      font-weight:900;
      letter-spacing:.12em;
      text-transform:uppercase;
      cursor:pointer;
      position:relative;
    }

    .power-knob::before{
      content:"";
      position:absolute;
      top:13px;
      left:50%;
      width:6px;
      height:20px;
      transform:translateX(-50%);
      border-radius:999px;
      background:#fff5cb;
      box-shadow:0 0 8px rgba(255,245,203,.45);
    }

    .power-label{
      color:var(--muted);
      font-size:11px;
      letter-spacing:.16em;
      text-transform:uppercase;
    }

    audio{
      display:none;
    }

    @keyframes equalize{
      0%, 100%{ transform:scaleY(.55); }
      50%{ transform:scaleY(1); }
    }

    .stations{
      display:grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap:16px;
    }

    .station{
      display:flex;
      align-items:center;
      justify-content:center;
      width:100%;
      min-height:170px;
      aspect-ratio: 1 / 1;
      padding:0;
      margin:0;
      border:1px solid #666;
      border-radius:16px;
      background: transparent;
      cursor:pointer;
      overflow:hidden;
      -webkit-tap-highlight-color: transparent;
    }

    .station:active{
      transform: translateY(1px);
    }

    .station img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
      border-radius:12px;
      background: rgba(255,255,255,.03);
    }

    .spotify-float{
      position: fixed;
      top: 80px;
      right: 32px;
      width: 170px;
      min-height: 170px;
      aspect-ratio: 1 / 1;
    }

    .hint{
      color:var(--muted);
      font-size:12px;
      line-height:1.4;
      margin-top:10px;
    }
  </style>
</head>

<body class="theme-glass">
  <div class="app">
    <header>
      <div class="brand">
        <div class="title">Beach House</div>
        <div class="sub"></div>
      </div>

      <div class="right">
        <div class="themebar" id="themebar">
          <button class="chip" data-theme="theme-glass">Glass</button>
          <button class="chip" data-theme="theme-light">Light</button>
          <button class="chip" data-theme="theme-radio">Radio</button>
        </div>
        <div class="pill" id="clock">--:--</div>
      </div>
    </header>

    <button class="station spotify-float" onclick="openApp('spotify:')">
      <img src="spotify.svg" alt="Spotify">
    </button>

    <div class="grid">
      <section class="card">
        <div class="hd">
          <h2>Radio</h2>
          <span></span>
        </div>
        <div class="bd">
          <div class="radio-shell">
            <div class="radio-top">
              <div class="radio-brand">
                <span class="live-dot" id="liveDot"></span>
                <span>FM Receiver</span>
              </div>
              <div class="status-pill" id="liveBadge">Standby</div>
            </div>

            <div class="radio-face">
              <div class="radio-panel">
                <div class="freq-label">On Air</div>
                <div class="radio-station" id="nowTitle">Radio Off</div>

                <div class="radio-status">
                  <span class="status-pill" id="bandLabel">FM</span>
                  <span class="status-text" id="nowStatus">Select a station to tune in</span>
                </div>

                <div class="tuner" id="tuner">
                  <div class="tuner-needle" id="tunerNeedle"></div>
                  <div class="tuner-scale">
                    <span>88</span>
                    <span>92</span>
                    <span>96</span>
                    <span>100</span>
                    <span>104</span>
                    <span>108</span>
                  </div>
                </div>

                <div class="radio-bottom">
                  <div>
                    <div class="signal" id="signalBars">
                      <span></span>
                      <span></span>
                      <span></span>
                      <span></span>
                    </div>
                    <div class="radio-caption">Signal Strength</div>
                  </div>
                  <div class="radio-caption" id="dialLabel">Tune to begin</div>
                </div>
              </div>

              <div class="power-wrap">
                <button class="power-knob" onclick="stopRadio()">Stop</button>
                <div class="power-label">Power</div>
              </div>
            </div>

            <audio id="radio" preload="none"></audio>
          </div>
        </div>
      </section>

      <section class="card" style="grid-column: 1 / -1;">
        <div class="hd">
          <h2>Stations</h2>
          <span></span>
        </div>
        <div class="bd">
          <div class="stations">
            <button class="station" onclick="play('RTE 1','https://icecast.rte.ie/radio1')">
              <img src="rteradio1.png" alt="RTE Radio 1">
            </button>

            <button class="station" onclick="play('Sunshine 106.8','https://playerservices.streamtheworld.com/api/livestream-redirect/SUNSHINE_106_8AAC.aac')">
              <img src="sunshine1068.png" alt="Sunshine 106.8">
            </button>

            <button class="station" onclick="play('East Coast FM','https://playerservices.streamtheworld.com/api/livestream-redirect/EAST_COAST_FM.mp3')">
              <img src="eastcoastfm.png" alt="East Coast FM">
            </button>

            <button class="station" onclick="play('2FM','https://icecast.rte.ie/2fm')">
              <img src="2fm.png" alt="RTE 2 FM">
            </button>
          </div>
        </div>
      </section>
    </div>
  </div>

  <script>
    function tick(){
      const d = new Date();
      const hh = String(d.getHours()).padStart(2,'0');
      const mm = String(d.getMinutes()).padStart(2,'0');
      document.getElementById('clock').textContent = `${hh}:${mm}`;
    }

    tick();
    setInterval(tick, 1000);

    function openApp(uri){
      window.location.href = uri;
    }

    const THEME_KEY = "musicpanel_theme";

    function applyTheme(theme){
      document.body.classList.remove("theme-glass","theme-light","theme-radio");
      document.body.classList.add(theme);
      localStorage.setItem(THEME_KEY, theme);

      document.querySelectorAll(".chip").forEach(btn => {
        btn.classList.toggle("active", btn.dataset.theme === theme);
      });
    }

    document.getElementById("themebar").addEventListener("click", (e) => {
      const btn = e.target.closest(".chip");
      if(btn) applyTheme(btn.dataset.theme);
    });

    applyTheme(localStorage.getItem(THEME_KEY) || "theme-glass");

    const audio = document.getElementById('radio');
    const nowTitle = document.getElementById('nowTitle');
    const nowStatus = document.getElementById('nowStatus');
    const liveBadge = document.getElementById('liveBadge');
    const dialLabel = document.getElementById('dialLabel');
    const tuner = document.getElementById('tuner');
    const signalBars = document.getElementById('signalBars');

    const stationDialMap = {
      "RTE 1": 22,
      "Sunshine 106.8": 88,
      "East Coast FM": 58,
      "2FM": 46
    };

    function setDial(position){
      tuner.style.setProperty('--needle-pos', `${position}%`);
    }

    setDial(50);

    function play(name, url){
      nowTitle.textContent = name;
      nowStatus.textContent = 'Tuning...';
      liveBadge.textContent = 'Live';
      dialLabel.textContent = 'Locked';
      signalBars.classList.add('active');
      setDial(stationDialMap[name] ?? 50);
      audio.src = url;

      audio.play()
        .then(() => {
          nowStatus.textContent = 'Broadcasting now';
        })
        .catch(() => {
          nowStatus.textContent = 'Signal unavailable';
          liveBadge.textContent = 'Error';
          dialLabel.textContent = 'Retune';
          signalBars.classList.remove('active');
        });
    }

    function stopRadio(){
      audio.pause();
      audio.removeAttribute('src');
      audio.load();
      nowTitle.textContent = 'Radio Off';
      nowStatus.textContent = 'Select a station to tune in';
      liveBadge.textContent = 'Standby';
      dialLabel.textContent = 'Tune to begin';
      signalBars.classList.remove('active');
      setDial(50);
    }
  </script>
</body>
</html>
