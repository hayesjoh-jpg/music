<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#111826" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="manifest" href="manifest.webmanifest" />
  <title>Music Panel</title>

  <style>
    :root{
      --bg0:#050812;
      --bg1:#0b1230;
      --card: rgba(255,255,255,.08);
      --card2: rgba(255,255,255,.05);
      --stroke: rgba(255,255,255,.14);
      --text:#EAF0FF;
      --muted:#AAB6D2;
      --accent:#1DB954;
      --shadow: 0 18px 55px rgba(0,0,0,.55);
      --r: 22px;
      --glowA: rgba(29,185,84,.28);
      --glowB: rgba(80,145,255,.22);
      --tile-size:170px;
    }

    body.theme-light{
      --bg0:#eef2ff;
      --bg1:#f7f9ff;
      --card: rgba(255,255,255,.75);
      --card2: rgba(255,255,255,.55);
      --stroke: rgba(0,0,0,.10);
      --text:#0e1422;
      --muted:#4b5870;
      --accent:#1DB954;
      --shadow: 0 16px 45px rgba(0,0,0,.10);
      --glowA: rgba(29,185,84,.20);
      --glowB: rgba(80,145,255,.18);
    }

    body.theme-radio{
      --bg0:#090b13;
      --bg1:#1b1034;
      --card: rgba(255,255,255,.07);
      --card2: rgba(255,255,255,.04);
      --stroke: rgba(255,255,255,.13);
      --text:#fff2f2;
      --muted:#d2b7bf;
      --accent:#ff3b5c;
      --shadow: 0 18px 55px rgba(0,0,0,.55);
      --glowA: rgba(255,59,92,.24);
      --glowB: rgba(255,196,59,.14);
    }

    *{ box-sizing:border-box; }

    html, body{
      height:100%;
      margin:0;
    }

    body{
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      color: var(--text);
      background:
        radial-gradient(1200px 800px at 18% -10%, var(--glowB) 0%, transparent 55%),
        radial-gradient(900px 650px at 92% 8%, var(--glowA) 0%, transparent 52%),
        linear-gradient(180deg, var(--bg1), var(--bg0));
      overflow-x:hidden;
    }

    .app{
      max-width:1100px;
      margin:0 auto;
      padding:16px;
      display:flex;
      flex-direction:column;
      gap:14px;
    }

    .grid{
      display:grid;
      grid-template-columns: 1fr;
      gap:14px;
      align-items:start;
    }

    @media (max-width: 900px){
      .grid{
        grid-template-columns: 1fr;
      }
    }

    .card{
      border-radius: var(--r);
      border: 1px solid var(--stroke);
      background: linear-gradient(180deg, var(--card), var(--card2));
      box-shadow: var(--shadow);
      overflow:hidden;
      backdrop-filter: blur(14px);
    }

    .card .hd{
      padding:14px 14px 0;
      display:flex;
      align-items:baseline;
      justify-content:space-between;
      gap:10px;
    }

    .card .hd h2{
      margin:0;
      font-size:16px;
      letter-spacing:.2px;
    }

    .card .hd span{
      color:var(--muted);
      font-size:12px;
      white-space:nowrap;
    }

    .card .bd{
      padding:14px;
    }

    .btn-primary{
      width:100%;
      border:0;
      border-radius:18px;
      padding:18px 16px;
      font-size:22px;
      font-weight:900;
      color:#06110a;
      background: var(--accent);
      box-shadow: 0 16px 36px rgba(0,0,0,.25);
      cursor:pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .btn-primary:active{
      transform: translateY(1px);
    }

    .radio-shell{
      position:relative;
      border:1px solid rgba(255,232,191,.18);
      border-radius:28px;
      padding:18px;
      background:
        linear-gradient(135deg, rgba(90,55,26,.95), rgba(53,32,21,.96)),
        linear-gradient(180deg, rgba(255,255,255,.06), rgba(0,0,0,.20));
      box-shadow:
        inset 0 1px 0 rgba(255,242,214,.14),
        inset 0 -16px 24px rgba(0,0,0,.20),
        0 20px 40px rgba(0,0,0,.34);
    }

    .radio-shell::before{
      content:"";
      position:absolute;
      inset:10px;
      border-radius:22px;
      border:1px solid rgba(255,230,188,.08);
      pointer-events:none;
    }

    .radio-shell::after{
      content:"";
      position:absolute;
      inset:0;
      border-radius:28px;
      background:
        repeating-linear-gradient(
          90deg,
          rgba(255,255,255,.02) 0,
          rgba(255,255,255,.02) 2px,
          transparent 2px,
          transparent 28px
        );
      opacity:.25;
      pointer-events:none;
    }

    .radio-top{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin-bottom:14px;
      position:relative;
      z-index:1;
    }

    .radio-brand{
      display:flex;
      align-items:center;
      gap:10px;
      color:#dbc6a5;
      font-size:12px;
      text-transform:uppercase;
      letter-spacing:.22em;
    }

    .live-dot{
      width:10px;
      height:10px;
      border-radius:50%;
      background:#ff5b6e;
      box-shadow:0 0 12px rgba(255,91,110,.75);
    }

    .radio-face{
      display:block;
      position:relative;
      z-index:1;
    }

    .radio-panel{
      min-width:0;
      border:1px solid rgba(232,210,176,.18);
      border-radius:20px;
      padding:16px;
      background:
        linear-gradient(180deg, rgba(87,62,40,.72), rgba(30,22,17,.92));
      box-shadow:
        inset 0 1px 0 rgba(255,248,225,.08),
        inset 0 -10px 18px rgba(0,0,0,.22);
    }

    .freq-label{
      color:#d5ba91;
      font-size:11px;
      letter-spacing:.28em;
      text-transform:uppercase;
      margin-bottom:8px;
    }

    .radio-station{
      font-size:28px;
      line-height:1;
      font-weight:900;
      letter-spacing:.04em;
      margin:0 0 8px;
      text-transform:uppercase;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      color:#fff3d6;
    }

    .radio-status{
      display:flex;
      align-items:center;
      gap:10px;
      margin-bottom:14px;
    }

    .status-pill{
      padding:5px 10px;
      border-radius:999px;
      border:1px solid rgba(255,226,178,.14);
      background:rgba(255,236,199,.08);
      color:#ffe8bf;
      font-size:11px;
      font-weight:800;
      letter-spacing:.12em;
      text-transform:uppercase;
    }

    .status-text{
      color:#dec8a8;
      font-size:13px;
    }

    .tuner-row{
      display:grid;
      grid-template-columns:minmax(0, 1fr) 108px;
      gap:16px;
      align-items:center;
    }

    .tuner-stack{
      min-width:0;
    }

    .tuner{
      position:relative;
      height:56px;
      border-radius:16px;
      padding:0 14px;
      background:
        linear-gradient(180deg, rgba(253,236,194,.96), rgba(212,182,126,.90));
      border:1px solid rgba(104,67,28,.55);
      display:flex;
      align-items:center;
      overflow:hidden;
      box-shadow:
        inset 0 1px 0 rgba(255,251,231,.65),
        inset 0 -8px 10px rgba(112,77,31,.20);
    }

    .tuner::before{
      content:"";
      position:absolute;
      inset:50% 14px auto;
      height:2px;
      transform:translateY(-50%);
      background:linear-gradient(90deg, rgba(82,49,18,.28), rgba(82,49,18,.78), rgba(82,49,18,.28));
    }

    .tuner-scale{
      position:relative;
      z-index:1;
      display:flex;
      justify-content:space-between;
      width:100%;
      color:#6b4218;
      font-size:12px;
      font-weight:700;
      font-variant-numeric:tabular-nums;
    }

    .tuner-needle{
      position:absolute;
      top:6px;
      bottom:6px;
      left:var(--needle-pos, 50%);
      width:3px;
      border-radius:999px;
      transform:translateX(-50%);
      background:linear-gradient(180deg, #9b140d, #5a0b07);
      box-shadow:0 0 8px rgba(155,20,13,.28);
    }

    .radio-bottom{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
      margin-top:14px;
    }

    .signal{
      display:flex;
      align-items:flex-end;
      gap:6px;
      min-height:28px;
    }

    .signal span{
      width:8px;
      border-radius:999px;
      background:linear-gradient(180deg, rgba(126,255,177,.95), rgba(23,164,88,.55));
      box-shadow:0 0 10px rgba(29,185,84,.28);
      opacity:.35;
      transform-origin:bottom;
      transition:opacity .2s ease, transform .2s ease;
    }

    .signal span:nth-child(1){ height:8px; }
    .signal span:nth-child(2){ height:14px; }
    .signal span:nth-child(3){ height:20px; }
    .signal span:nth-child(4){ height:26px; }

    .signal.active span{
      opacity:1;
      animation:equalize 1.1s ease-in-out infinite;
    }

    .signal.active span:nth-child(2){ animation-delay:.15s; }
    .signal.active span:nth-child(3){ animation-delay:.3s; }
    .signal.active span:nth-child(4){ animation-delay:.45s; }

    .radio-caption{
      color:#d9c29b;
      font-size:12px;
      letter-spacing:.14em;
      text-transform:uppercase;
    }

    .power-wrap{
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:10px;
    }

    .power-knob{
      width:92px;
      height:92px;
      border-radius:50%;
      border:1px solid rgba(255,223,179,.18);
      background:
        radial-gradient(circle at 30% 30%, rgba(255,244,213,.30), transparent 35%),
        linear-gradient(180deg, rgba(189,150,101,.75), rgba(95,63,34,.96));
      box-shadow:
        inset 0 2px 10px rgba(255,247,226,.10),
        inset 0 -10px 18px rgba(48,28,12,.34),
        0 16px 30px rgba(0,0,0,.24);
      color:#fff2d1;
      font-weight:900;
      letter-spacing:.12em;
      text-transform:uppercase;
      cursor:pointer;
      position:relative;
    }

    .power-knob::before{
      content:"";
      position:absolute;
      top:13px;
      left:50%;
      width:6px;
      height:20px;
      transform:translateX(-50%);
      border-radius:999px;
      background:#fff5cb;
      box-shadow:0 0 8px rgba(255,245,203,.45);
    }

    .power-label{
      color:#d9c29b;
      font-size:11px;
      letter-spacing:.16em;
      text-transform:uppercase;
    }

    @media (max-width: 980px){
      .radio-face{
        display:block;
      }

      .tuner-row{
        grid-template-columns:1fr;
      }
    }

    audio{
      display:none;
    }

    @keyframes equalize{
      0%, 100%{ transform:scaleY(.55); }
      50%{ transform:scaleY(1); }
    }

    .stations{
      display:grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap:16px;
    }

    .station{
      display:flex;
      align-items:center;
      justify-content:center;
      width:100%;
      min-height:var(--tile-size);
      aspect-ratio: 1 / 1;
      padding:0;
      margin:0;
      border:1px solid #666;
      border-radius:16px;
      background: transparent;
      cursor:pointer;
      overflow:hidden;
      -webkit-tap-highlight-color: transparent;
    }

    .station:active{
      transform: translateY(1px);
    }

    .station img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
      border-radius:12px;
      background: rgba(255,255,255,.03);
    }

    .hint{
      color:var(--muted);
      font-size:12px;
      line-height:1.4;
      margin-top:10px;
    }

    @media (max-width: 900px){
      :root{
        --tile-size:120px;
      }

      .app{
        padding:12px;
        gap:10px;
      }

      .card .hd{
        padding:12px 12px 0;
      }

      .card .bd{
        padding:12px;
      }

      .stations{
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap:12px;
      }
    }

    @media (max-height: 900px) and (orientation: landscape){
      :root{
        --tile-size:84px;
      }

      .app{
        padding:8px 10px;
        gap:8px;
      }

      .grid{
        gap:8px;
      }

      .card .hd{
        padding:8px 8px 0;
      }

      .card .hd h2{
        font-size:13px;
      }

      .card .bd{
        padding:8px;
      }

      .radio-shell{
        padding:10px;
        border-radius:18px;
      }

      .radio-shell::before{
        inset:6px;
        border-radius:14px;
      }

      .radio-top{
        margin-bottom:8px;
      }

      .radio-brand{
        font-size:10px;
        letter-spacing:.14em;
      }

      .status-pill{
        padding:3px 7px;
        font-size:9px;
      }

      .radio-panel{
        padding:10px;
        border-radius:16px;
      }

      .freq-label{
        margin-bottom:4px;
        font-size:9px;
      }

      .radio-station{
        font-size:18px;
        margin-bottom:4px;
      }

      .radio-status{
        gap:6px;
        margin-bottom:8px;
      }

      .status-text{
        font-size:11px;
      }

      .tuner-row{
        grid-template-columns:minmax(0, 1fr) 72px;
        gap:10px;
      }

      .tuner{
        height:34px;
        border-radius:11px;
      }

      .tuner-scale{
        font-size:9px;
      }

      .radio-bottom{
        margin-top:8px;
      }

      .signal{
        min-height:18px;
        gap:4px;
      }

      .signal span{
        width:5px;
      }

      .signal span:nth-child(1){ height:5px; }
      .signal span:nth-child(2){ height:8px; }
      .signal span:nth-child(3){ height:11px; }
      .signal span:nth-child(4){ height:14px; }

      .radio-caption{
        font-size:9px;
      }

      .power-wrap{
        gap:4px;
      }

      .power-knob{
        width:60px;
        height:60px;
        font-size:10px;
      }

      .power-knob::before{
        top:8px;
        height:12px;
      }

      .power-label{
        font-size:9px;
      }

      .stations{
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap:8px;
      }

      .station{
        border-radius:12px;
      }

      .station img{
        border-radius:10px;
      }
    }
  </style>
</head>

  <body class="theme-glass">
    <div class="app">
      <div class="grid">
        <section class="card">
          <div class="hd">
            <h2>Radio</h2>
          <span></span>
        </div>
        <div class="bd">
          <div class="radio-shell">
            <div class="radio-top">
              <div class="radio-brand">
                <span class="live-dot" id="liveDot"></span>
                <span>FM Receiver</span>
              </div>
              <div class="status-pill" id="liveBadge">Standby</div>
            </div>

            <div class="radio-face">
              <div class="radio-panel">
                <div class="freq-label">On Air</div>
                <div class="radio-station" id="nowTitle">Radio Off</div>

                <div class="radio-status">
                  <span class="status-pill" id="bandLabel">FM</span>
                  <span class="status-text" id="nowStatus">Select a station to tune in</span>
                </div>

                <div class="tuner-row">
                  <div class="tuner-stack">
                    <div class="tuner" id="tuner">
                      <div class="tuner-needle" id="tunerNeedle"></div>
                      <div class="tuner-scale">
                        <span>88</span>
                        <span>92</span>
                        <span>96</span>
                        <span>100</span>
                        <span>104</span>
                        <span>108</span>
                      </div>
                    </div>
                  </div>

                  <div class="power-wrap">
                    <button class="power-knob" onclick="stopRadio()">Stop</button>
                    <div class="power-label">Power</div>
                  </div>
                </div>

                <div class="radio-bottom">
                  <div>
                    <div class="signal" id="signalBars">
                      <span></span>
                      <span></span>
                      <span></span>
                      <span></span>
                    </div>
                    <div class="radio-caption">Signal Strength</div>
                  </div>
                  <div class="radio-caption" id="dialLabel">Tune to begin</div>
                </div>
              </div>
            </div>

            <audio id="radio" preload="none"></audio>
          </div>
        </div>
      </section>

        <section class="card" style="grid-column: 1 / -1;">
          <div class="hd">
          <h2>Stations</h2>
          <span></span>
        </div>
        <div class="bd">
          <div class="stations">
            <button class="station" onclick="openSpotify()" aria-label="Open Spotify">
              <img src="spotify.svg" alt="Spotify">
            </button>

            <button class="station" onclick="play('RTE 1','https://icecast.rte.ie/radio1')">
              <img src="rteradio1.png" alt="RTE Radio 1">
            </button>

            <button class="station" onclick="play('Sunshine 106.8','https://playerservices.streamtheworld.com/api/livestream-redirect/SUNSHINE_106_8AAC.aac')">
              <img src="sunshine1068.png" alt="Sunshine 106.8">
            </button>

            <button class="station" onclick="play('East Coast FM','https://playerservices.streamtheworld.com/api/livestream-redirect/EAST_COAST_FM.mp3')">
              <img src="eastcoastfm.png" alt="East Coast FM">
            </button>

            <button class="station" onclick="play('2FM','https://icecast.rte.ie/2fm')">
              <img src="2fm.png" alt="RTE 2 FM">
            </button>
          </div>
        </div>
      </section>
    </div>
  </div>

  <script>
    function openApp(uri){
      window.location.href = uri;
    }

    function openSpotify(){
      const fallbackUrl = 'https://open.spotify.com/';
      const intentUrl = 'intent://open.spotify.com/#Intent;scheme=https;package=com.spotify.music;end';

      try{
        const frame = document.createElement('iframe');
        frame.style.display = 'none';
        frame.src = 'spotify:';
        document.body.appendChild(frame);
        setTimeout(() => frame.remove(), 1200);
      } catch (e) {}

      setTimeout(() => {
        try{
          window.location.href = intentUrl;
        } catch (e) {
          window.open(fallbackUrl, '_blank');
        }
      }, 250);

      setTimeout(() => {
        if (document.visibilityState === 'visible') {
          window.open(fallbackUrl, '_blank');
        }
      }, 1200);
    }

    const audio = document.getElementById('radio');
    const nowTitle = document.getElementById('nowTitle');
    const nowStatus = document.getElementById('nowStatus');
    const liveBadge = document.getElementById('liveBadge');
    const dialLabel = document.getElementById('dialLabel');
    const tuner = document.getElementById('tuner');
    const signalBars = document.getElementById('signalBars');

    const stationDialMap = {
      "RTE 1": 22,
      "Sunshine 106.8": 88,
      "East Coast FM": 58,
      "2FM": 46
    };

    function setDial(position){
      tuner.style.setProperty('--needle-pos', `${position}%`);
    }

    setDial(50);

    function play(name, url){
      nowTitle.textContent = name;
      nowStatus.textContent = 'Tuning...';
      liveBadge.textContent = 'Live';
      dialLabel.textContent = 'Locked';
      signalBars.classList.add('active');
      setDial(stationDialMap[name] ?? 50);
      audio.src = url;

      audio.play()
        .then(() => {
          nowStatus.textContent = 'Broadcasting now';
        })
        .catch(() => {
          nowStatus.textContent = 'Signal unavailable';
          liveBadge.textContent = 'Error';
          dialLabel.textContent = 'Retune';
          signalBars.classList.remove('active');
        });
    }

    function stopRadio(){
      audio.pause();
      audio.removeAttribute('src');
      audio.load();
      nowTitle.textContent = 'Radio Off';
      nowStatus.textContent = 'Select a station to tune in';
      liveBadge.textContent = 'Standby';
      dialLabel.textContent = 'Tune to begin';
      signalBars.classList.remove('active');
      setDial(50);
    }
  </script>
</body>
</html>
